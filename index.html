<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Perpustakaan Digital</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 25px;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #error {
            color: red;
            margin-top: 15px;
            display: none;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">📚</div>

    <h1>Perpustakaan Digital</h1>

    <p>Masukkan password untuk masuk</p>

    <input 
        type="password" 
        id="password" 
        placeholder="Masukkan password"
    >

    <button onclick="login()">Masuk</button>

    <div id="error">
        Password salah. Sila cuba lagi.
    </div>

    <div class="footer">
        © 2026 Perpustakaan Digital
    </div>

</div>

<script>

function login() {

    const password = document.getElementById("password").value;

    // TUKAR PASSWORD DI SINI
    const correctPassword = "MadDigital2026";

    if (password === correctPassword) {

        window.location.href = "ebook.html";

    } else {

        document.getElementById("error").style.display = "block";

    }

}

</script>

</body>
</html>
